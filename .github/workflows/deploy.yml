name: my first laravel cd pipeline
on:
  push:
    branches: [main]
jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: get secrets
        run: echo " KEY IS ${{ secrets.KEY}} AND HOST IS ${{ secrets.HOST}}"
      - name: Execute remote SSH commands using password
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |
            cd /var/www/trying_github_simple_deployment_laravel_github_action
            sudo git pull
      - name: done
        run: echo "done deploying"
